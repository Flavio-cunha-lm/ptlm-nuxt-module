name: Publish Modules to npm

on:
  push:
    branches:
      - main
    paths:
      - '**/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies & Publish
        run: |
          # Find all directories containing package.json inside moduleMaker
          MODS=$(find . -mindepth 1 -maxdepth 1 -type d)
          
          for dir in $MODS; do
            if [ -f "$dir/package.json" ]; then
              echo "Processing $dir..."
              cd "$dir"
              
              # Temporarily remove workspaces from package.json to prevent npm from trying to resolve the unpublished module in playground
              if [[ -f "package.json" ]]; then
                cp package.json package.json.backup
                node -e "const pkg = require('./package.json'); delete pkg.workspaces; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));"
              fi

              # Install dependencies using npm --no-workspaces or falling back to standard install
              npm ci --no-workspaces || npm install --no-workspaces

              # Prepare the Nuxt module to generate .nuxt/tsconfig.json
              echo "Preparing Nuxt module..."
              # Nuxt prepare step requires the module to be built/linked, so we use `npx nuxt-module-build build --stub`
              npx nuxt-module-build build --stub
              npx nuxt-module-build prepare

              # Build the Nuxt 4 module
              echo "Building Nuxt module..."
              npm run prepack --if-present

              # Restore the package.json so publish includes the original file
              if [[ -f "package.json.backup" ]]; then
                mv package.json.backup package.json
              fi
              
              # Publish to npm (requires NPM_TOKEN secret)
              npm publish --access public || echo "Publishing $dir failed or already published."
              
              cd - > /dev/null
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
